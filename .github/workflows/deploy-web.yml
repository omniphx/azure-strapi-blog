name: Deploy Web (Next.js)

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_STRAPI_URL: ${{ secrets.NEXT_PUBLIC_STRAPI_URL }}
          STRAPI_HOSTNAME: ${{ secrets.STRAPI_HOSTNAME }}
          STRAPI_BLOB_HOSTNAME: ${{ secrets.STRAPI_BLOB_HOSTNAME }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Disable Oryx remote build
        run: |
          az webapp config appsettings set \
            --name mm-blog-web \
            --resource-group $(az webapp show --name mm-blog-web --query resourceGroup -o tsv) \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false

      - name: Prepare standalone deployment
        run: |
          DEPLOY=${{ runner.temp }}/deploy
          # Copy entire standalone output (preserves monorepo node_modules layout)
          cp -r apps/web/.next/standalone/. "$DEPLOY/"
          # Copy static assets and public into the app directory
          mkdir -p "$DEPLOY/apps/web/.next/static"
          cp -r apps/web/.next/static/. "$DEPLOY/apps/web/.next/static/"
          mkdir -p "$DEPLOY/apps/web/public"
          cp -r apps/web/public/. "$DEPLOY/apps/web/public/"
          cd "$DEPLOY"
          zip -r ${{ runner.temp }}/web-deploy.zip .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: mm-blog-web
          package: ${{ runner.temp }}/web-deploy.zip
          startup-command: "node apps/web/server.js"
