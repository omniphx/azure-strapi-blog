name: Deploy Web (Next.js)

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  REGISTRY: mmblogacr.azurecr.io
  IMAGE_NAME: web

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name mmblogacr

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_STRAPI_URL=${{ secrets.NEXT_PUBLIC_STRAPI_URL }} \
            --build-arg STRAPI_HOSTNAME=${{ secrets.STRAPI_HOSTNAME }} \
            --build-arg STRAPI_BLOB_HOSTNAME=${{ secrets.STRAPI_BLOB_HOSTNAME }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -f apps/web/Dockerfile \
            .

          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} --all-tags

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: mm-blog-web
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
