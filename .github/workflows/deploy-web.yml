name: Deploy Web (Next.js)

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --filter web install --frozen-lockfile

      - name: Build
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_STRAPI_URL: ${{ secrets.NEXT_PUBLIC_STRAPI_URL }}
          STRAPI_HOSTNAME: ${{ secrets.STRAPI_HOSTNAME }}
          STRAPI_BLOB_HOSTNAME: ${{ secrets.STRAPI_BLOB_HOSTNAME }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build deployment zip
        run: |
          cd apps/web
          zip -r ${{ runner.temp }}/web-deploy.zip . \
            --exclude "*.git*" \
            --exclude ".env*" \
            --exclude "node_modules/*"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: mm-blog-web
          package: ${{ runner.temp }}/web-deploy.zip
